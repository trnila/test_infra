name: deploy

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  prek:
    # dont run on both pull request and push event
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: exit 0

  deploy:
    if: github.ref == 'refs/heads/master' && github.repository == 'trnila/test_infra'
    runs-on: ubuntu-latest
    needs: prek
    env:
      DEPLOY_HOST: root@pi.tailea1575.ts.net
    steps:
      - run: echo deploying
