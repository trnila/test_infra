name: update flake
permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      input:
        description: Flake input to update
        required: true
        type: string
      rev:
        description: Revision to update to (eg. github:user/repo/rev)
        required: false
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - run: |
          if [ -n "${{ inputs.rev }}" ]; then
            nix flake lock --override-input "${{ inputs.input }}" "${{ inputs.rev }}"
          else
            nix flake update "${{ inputs.input }}"
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git diff --cached --quiet && exit 0
          git commit -m "flake: update ${{ inputs.input }}"
          git push