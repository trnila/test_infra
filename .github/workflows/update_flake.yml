name: update flake

on:
  workflow_dispatch:
    inputs:
      input:
        description: Flake input to update
        required: true
        type: string
      rev:
        description: Revision to update to (eg. github:user/repo/rev)
        required: false
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # the same GITHUB_TOKEN wont trigger push workflows
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          gh auth setup-git
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
      - uses: cachix/install-nix-action@v31
      - run: |
          if [ -n "${{ inputs.rev }}" ]; then
            nix flake lock --override-input "${{ inputs.input }}" "${{ inputs.rev }}"
          else
            nix flake update "${{ inputs.input }}"
          fi
      - name: Commit changes
        run: |
          git add flake.lock
          git diff --cached --quiet && exit 0
          git commit -m "flake: update ${{ inputs.input }} ${{ inputs.rev }}"
          git push